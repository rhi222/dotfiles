# https://yazi-rs.github.io/docs/configuration/yazi
[mgr]
ratio = [1, 3, 3]
sort_by = "natural"
sort_dir_first = true
show_hidden = true
linemode = "mtime"

[preview]
# 大きめのプレビューを許可（デフォルトは 600x900）
max_width = 1000
max_height = 1000

[opener]
edit = [
  { run = '$EDITOR "$@"', block = true, for = "unix" },
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "*/javascript", use = "edit" },
  { mime = "application/x-shellscript", use = "edit" },
]

# git.yazi: ファイル一覧に git status サイン（M/A/?/!）を表示
# https://github.com/yazi-rs/plugins/tree/main/git.yazi
[[plugin.prepend_fetchers]]
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
url = "*/"
run = "git"
group = "git"
