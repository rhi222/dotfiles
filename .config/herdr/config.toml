# herdr 設定
# 実体はこのファイル。config.toml 単体を ~/.config/herdr/config.toml へシンボリックリンクする
# （ディレクトリごとリンクすると herdr のログ(herdr*.log)がリポジトリに漏れるため）
# 反映方法: prefix -> Shift+R、または `herdr server reload-config`
# デフォルト設定の全体は `herdr --default-config` で確認できる

[theme]
# tmux の Solarized dark 配色に合わせる（herdr ビルトインテーマ）
name = "tokyo-night"

auto_switch = false

# 上部タブの非活性 workspace 名を読みやすくする。この名前は overlay0 で描画される。
# overlay0 は他の控えめ要素にも共有される（セマンティックトークン）ため、白まで上げると
# 全体が派手になる。tokyo-night 本来の前景色に合わせ、標準テキストと同じ明るさに留める。
[theme.custom]
overlay0 = "#c0caf5"  # tokyo-night fg

[terminal]
# 新ペイン/タブは元ペインのディレクトリを引き継ぐ
# tmux の `new-window -c "#{pane_current_path}"` 相当（herdr デフォルトだが明示）
new_cwd = "follow"
# default_shell は未指定 = $SHELL(fish) を継承する

[keys]
# standalone 運用のため tmux と同じ Ctrl-b を維持（指の記憶をそのまま活かす）
prefix = "ctrl+b"
# ペイン移動は vim 式 prefix+h/j/k/l（herdr デフォルト。tmux で `o` 巡回していた操作の上位互換）
# タブ移動は prefix+p / prefix+n、scrollback は prefix+e で $EDITOR(nvim) を開く（いずれもデフォルト）
# agent/workspace 切り替えは alt 併用が効かない環境のため、prefix+単一chord では next_/previous_ を
# 割り当てず、下記 [[keys.command]] の fzf popup（prefix+a / prefix+shift+s）に寄せる

# lazygit を popup 起動（lazygit を常用しているため。tmux の fzf popup 運用に近い追加）
[[keys.command]]
key = "prefix+alt+g"
type = "popup"
command = "lazygit"
width = "90%"
height = "90%"

# fzf でファイル検索 → 選択パスを呼び出し元ペインに挿入（tmux の bind f 相当）
# スクリプトは env HERDR_ACTIVE_PANE_ID / HERDR_ACTIVE_PANE_CWD を参照する
[[keys.command]]
key = "prefix+f"
type = "popup"
command = "$HOME/.config/herdr/scripts/fzf-file.sh"
width = "80%"
height = "50%"

# fzf で agent を選んでフォーカス移動（prefix+a）。alt 併用キーが効かない代替の popup 方式
[[keys.command]]
key = "prefix+a"
type = "popup"
command = "$HOME/.config/herdr/scripts/agent-switch.sh"
width = "80%"
height = "50%"

# fzf で workspace(spaces) を選んでフォーカス移動（prefix+shift+s）
[[keys.command]]
key = "prefix+shift+s"
type = "popup"
command = "$HOME/.config/herdr/scripts/workspace-switch.sh"
width = "80%"
height = "50%"

[ui]
# tmux 同様マウス操作・ドラッグコピーを有効化（いずれもデフォルトだが明示）
mouse_capture = true
copy_on_select = true

show_agent_labels_on_pane_borders = true
[ui.toast]
# WSL2 では OS 通知(system)に追加設定が要るため、まずアプリ内トーストで安全側に
# 慣れたら "system" / "terminal" へ変更可
delivery = "herdr"

[ui.sound]
# 背景ワークスペースのエージェントが状態変化したら音で知らせる
enabled = true

[session]
# サーバ再起動後もエージェントの会話セッションを復元
# tmux の resurrect/continuum（自動保存・復元）の思想に対応
resume_agents_on_restore = true
