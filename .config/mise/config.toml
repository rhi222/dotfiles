[tools]
# 言語ランタイム
bun = "latest"
deno = "latest"
go = "latest"
java = "21"
node = "24"
python = "latest"
rust = "latest"

# パッケージマネージャ
"npm:pnpm" = "latest"
uv = "latest"

# CLIツール（aquaバックエンドでプリビルドバイナリを取得）
aws = "latest"
bat = "latest"
bottom = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
gh = "latest"
delta = "latest"
gitui = "latest"
neovim = "latest"
ripgrep = "latest"
stylua = "latest"
tmux = "latest"
yazi = "latest"
zoxide = "latest"

# GitHub Releasesからバイナリをインストール
# https://mise.jdx.dev/dev-tools/backends/github.html
"github:k1LoW/mo" = "latest"

[settings]
# Pythonはプリビルドバイナリ優先（WSL2でコンパイル回避）
python.compile = false

# lockfileでバージョンを記録（再現性向上）
lockfile = true

# idiomatic version files を尊重（repo 単位で pin できる）
idiomatic_version_file_enable_tools = [
  "node",
  "python",
  "go",
]
