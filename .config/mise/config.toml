[tools]
# 言語ランタイム
bun = "latest"
deno = "latest"
go = "latest"
java = "21"
node = "24"
python = "latest"
rust = "latest"

# パッケージマネージャ
"npm:pnpm" = "latest"
uv = "latest"

# CLIツール（aquaバックエンドでプリビルドバイナリを取得）
aws = "latest"
bat = "latest"
bottom = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
gh = "latest"
delta = "latest"
gitui = "latest"
neovim = "latest"
ripgrep = "latest"
stylua = "latest"
tmux = "latest"
yazi = "latest"
zoxide = "latest"
yq = "latest"
herdr = "latest"

# GitHub Releasesからバイナリをインストール
# https://mise.jdx.dev/dev-tools/backends/github.html
"github:k1LoW/mo" = "latest"

# aquaバックエンドで管理するCLIツール（旧go install / npm / pip 経由から移行）
"aqua:d-kuro/gwq" = "latest"
"aqua:jesseduffield/lazydocker" = "latest"
"aqua:jesseduffield/lazygit" = "latest"
"aqua:k1LoW/deck" = "latest"
"aqua:k1LoW/tcmux" = "latest"
"aqua:k1LoW/git-wt" = "latest"
"aqua:x-motemen/ghq" = "latest"
"aqua:mvdan/sh" = "latest"          # shfmt
"aqua:koalaman/shellcheck" = "latest"
"aqua:astral-sh/ruff" = "latest"
"aqua:biomejs/biome" = "latest"
"aqua:marp-team/marp-cli" = "latest"
"aqua:tree-sitter/tree-sitter" = "latest"

# pipxバックエンドで管理するPython製CLIツール（隔離環境にインストール）
"pipx:git-remote-codecommit" = "latest"  # AWS CodeCommitのgit remote helper

[settings]
# Pythonはプリビルドバイナリ優先（WSL2でコンパイル回避）
python.compile = false

# lockfileでバージョンを記録（再現性向上）
lockfile = true

# リリース直後の壊れた版・yank される版を掴まないための枯らし期間。
# mise デフォルトは 24h だが、より安全側に 48h へ延長する。
minimum_release_age = "48h"

# idiomatic version files を尊重（repo 単位で pin できる）
idiomatic_version_file_enable_tools = [
  "node",
  "python",
  "go",
]
